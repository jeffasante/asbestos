<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asbestos Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f2f2f2;
            --bg-action: #e0e0e0;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-status: #8e8e93;
            --accent: #000000;
            --border: #f2f2f2;
            --font-sans: 'Quicksand', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
            --radius-card: 24px;
            --radius-btn: 50%;
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-primary);
            z-index: 100;
        }

        .header-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--text-status);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            transition: background 0.2s, color 0.2s;
        }

        .clear-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--bg-secondary);
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34c759;
        }

        /* ── Chat Area ──────────────────────────────── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .messages {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px 0;
        }

        .welcome h1 {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .welcome-subtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-status);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Message rendering */
        .message {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message.user {
            align-items: flex-end;
        }

        .message-content {
            font-size: 16px;
            line-height: 1.6;
            font-weight: 500;
        }

        .message.assistant .message-content {
            color: var(--text-primary);
            max-width: 100%;
        }

        .message.user .message-content {
            background: var(--bg-secondary);
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-right-radius: 4px;
            max-width: 80%;
        }

        /* Markdown styling inside messages */
        .message-content p { margin-bottom: 12px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content code {
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 6px;
        }
        .message-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 12px;
            padding: 0;
            margin: 12px 0;
            overflow: hidden;
            font-family: var(--font-mono);
            font-size: 13px;
        }
        .message-content pre code {
            display: block;
            padding: 16px;
            background: none;
            color: inherit;
            overflow-x: auto;
        }
        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: #2d2d2d;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            color: #858585;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .copy-btn {
            background: none;
            border: none;
            color: #858585;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }
        .copy-btn:hover {
            background: #3e3e3e;
            color: #d4d4d4;
        }

        /* Tables */
        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 14px;
        }
        .message-content th {
            background: var(--bg-secondary);
            font-weight: 700;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 2px solid var(--border);
        }
        .message-content td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .message-content tr:last-child td {
            border-bottom: none;
        }

        /* Blockquotes */
        .message-content blockquote {
            border-left: 3px solid var(--text-status);
            margin: 12px 0;
            padding: 4px 16px;
            color: var(--text-secondary);
        }

        /* Ordered lists */
        .message-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }
        .message-content ul {
            padding-left: 20px;
            margin: 8px 0;
        }
        .message-content li {
            margin-bottom: 4px;
        }

        /* HR */
        .message-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        .tool-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-secondary);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 8px 0;
        }

        .message-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
        }

        /* ── Input Area ─────────────────────────────── */
        .bottom-section {
            padding: 20px;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .input-card {
            width: 100%;
            max-width: 600px;
            background: var(--bg-secondary);
            border-radius: var(--radius-card);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .preview-container {
            display: none;
            position: relative;
            width: 64px;
            height: 64px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-action);
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-preview {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .input-field {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 600;
            resize: none;
            outline: none;
            padding: 4px;
            min-height: 24px;
            max-height: 200px;
        }

        .input-field::placeholder {
            color: var(--text-status);
        }

        .input-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-btn);
            background: var(--bg-action);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--text-primary);
            color: white;
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .stop-btn {
            width: 36px;
            height: 36px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .stop-btn:hover {
            transform: scale(1.05);
        }

        .drop-zone-active {
            box-shadow: inset 0 0 0 4px var(--text-status);
            opacity: 0.8;
        }

        .status-label {
            font-size: 9px;
            font-weight: 900;
            color: var(--text-status);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ── Typing Indicator ──────────────────────── */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-primary);
            animation: blink 1.2s infinite both;
            opacity: 0.2;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* ── SVG Icons ─────────────────────────────── */
        .icon-plus { width: 14px; height: 14px; stroke-width: 3px; }
        .icon-up { width: 20px; height: 20px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <header class="header">
        <span class="header-title">Asbestos</span>
        <div class="header-actions">
            <button class="clear-btn" onclick="clearConversation()" title="Clear Chat">Clear</button>
            <div class="status-pill">
                <span class="status-dot"></span>
                <span>Connected</span>
            </div>
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h1>HOW CAN I<br>HELP YOU?</h1>
                <span class="welcome-subtitle">Private. Personal. Powerful.</span>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="input-card">
            <div id="previewContainer" class="preview-container">
                <img id="imagePreview" class="preview-image" src="">
                <button class="remove-preview" onclick="clearImage()">×</button>
            </div>
            <textarea
                id="inputField"
                class="input-field"
                rows="1"
                placeholder="Message"
                autofocus
            ></textarea>
            
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelect(this)">
            
            <div class="input-actions">
                <button class="action-btn" onclick="document.getElementById('imageInput').click()" title="Attach Image">
                    <svg class="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>

                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg class="icon-up" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm1-8h3l-4-4-4 4h3v4h2v-4z"/>
                    </svg>
                </button>

                <button class="stop-btn" id="stopBtn" onclick="stopConversation()" title="Stop Generation">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="4" y="4" width="16" height="16" rx="2" />
                    </svg>
                </button>
            </div>
        </div>
        
        <span class="status-label" id="statusLabel">Asbestos is ready</span>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const chatContainer = document.getElementById('chatContainer');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const welcomeEl = document.getElementById('welcome');
        const statusLabel = document.getElementById('statusLabel');
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');

        let conversationHistory = [];
        let isProcessing = false;
        let selectedImageBase64 = null;
        let pendingConfirmationId = null;
        let currentAbortController = null;

        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = Math.min(inputField.scrollHeight, 200) + 'px';
            sendBtn.disabled = !inputField.value.trim() && !selectedImageBase64;
        });

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── Drag & Drop ──────────────────────────────
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('drop-zone-active');
        });

        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if (e.relatedTarget === null) {
                document.body.classList.remove('drop-zone-active');
            }
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.classList.remove('drop-zone-active');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleFile(files[0]);
            }
        });

        function handleImageSelect(input) {
            handleFile(input.files[0]);
        }

        function handleFile(file) {
            if (!file) return;

            // Resize image client-side to avoid 400 errors from llama-server
            // The model's image_max_pixels is ~4MP; large phone photos will fail
            const MAX_DIM = 1024;
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;
                if (width > MAX_DIM || height > MAX_DIM) {
                    if (width > height) {
                        height = Math.round(height * (MAX_DIM / width));
                        width = MAX_DIM;
                    } else {
                        width = Math.round(width * (MAX_DIM / height));
                        height = MAX_DIM;
                    }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.85);
                imagePreview.src = selectedImageBase64;
                previewContainer.style.display = 'block';
                sendBtn.disabled = false;
            };
            img.src = URL.createObjectURL(file);
        }

        function clearImage() {
            selectedImageBase64 = null;
            imageInput.value = '';
            previewContainer.style.display = 'none';
            imagePreview.src = '';
            sendBtn.disabled = !inputField.value.trim();
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if ((!text && !selectedImageBase64) || isProcessing) return;

            isProcessing = true;
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            
            if (welcomeEl) welcomeEl.style.display = 'none';

            currentAbortController = new AbortController();

            // Check if user is confirming a pending action
            if (pendingConfirmationId && text.toLowerCase() === 'yes') {
                appendMessage('user', text);
                inputField.value = '';
                inputField.style.height = 'auto';
                statusLabel.textContent = 'Confirming...';

                const typingEl = showTyping();
                try {
                    const confResp = await fetch(`/confirm/${pendingConfirmationId}`, {
                        method: 'POST',
                    });
                    const confData = await confResp.json();
                    typingEl.remove();

                    if (confData.status === 'ok') {
                        appendToolIndicator('file_rw', {}, confData);
                        appendMessage('assistant', `Done! File saved to \`${confData.path}\` (${confData.bytes_written} bytes).`);
                        conversationHistory.push({ role: 'assistant', content: `File saved to ${confData.path}` });
                    } else {
                        appendMessage('assistant', `Error: ${confData.message || 'Unknown error'}`);
                    }
                } catch (err) {
                    typingEl.remove();
                    appendMessage('assistant', `Error confirming: ${err.message}`);
                }

                pendingConfirmationId = null;
                isProcessing = false;
                sendBtn.style.display = 'flex';
                stopBtn.style.display = 'none';
                sendBtn.disabled = true;
                statusLabel.textContent = 'Asbestos is ready';
                inputField.focus();
                return;
            }

            // Reset any stale confirmation
            pendingConfirmationId = null;

            let userContent;
            if (selectedImageBase64) {
                userContent = [
                    { type: 'text', text: text || 'Analyze this image.' },
                    { type: 'image_url', image_url: { url: selectedImageBase64 } }
                ];
            } else {
                userContent = text;
            }

            conversationHistory.push({ role: 'user', content: userContent });
            appendMessage('user', text, selectedImageBase64);

            const imageToSend = selectedImageBase64; // copy
            clearImage();

            inputField.value = '';
            inputField.style.height = 'auto';
            statusLabel.textContent = 'Thinking...';

            const typingEl = showTyping();

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'asbestos-local',
                        messages: conversationHistory,
                        stream: true,
                    }),
                    signal: currentAbortController.signal,
                });

                typingEl.remove();

                // Create a live message bubble for streaming
                const liveMsgDiv = document.createElement('div');
                liveMsgDiv.className = 'message assistant';
                const liveContent = document.createElement('div');
                liveContent.className = 'message-content';
                liveMsgDiv.appendChild(liveContent);
                messagesEl.appendChild(liveMsgDiv);

                let fullText = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Process complete SSE lines
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete line in buffer

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.slice(6).trim();
                        if (payload === '[DONE]') continue;

                        try {
                            const chunk = JSON.parse(payload);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                // Check if it's a tool status line
                                if (delta.startsWith('Calling `')) {
                                    appendToolIndicator('tool', {}, { status: 'ok' });
                                } else {
                                    fullText += delta;
                                    liveContent.innerHTML = renderMarkdown(fullText);
                                    scrollToBottom();
                                }
                            }
                        } catch (e) {
                            // skip malformed chunks
                        }
                    }
                }

                // Final render with full markdown
                liveContent.innerHTML = renderMarkdown(fullText);
                conversationHistory.push({ role: 'assistant', content: fullText });

            } catch (err) {
                typingEl.remove();
                if (err.name === 'AbortError') {
                    appendMessage('assistant', '_Request stopped._');
                } else {
                    appendMessage('assistant', `Error: ${err.message}`);
                }
            }

            isProcessing = false;
            sendBtn.style.display = 'flex';
            stopBtn.style.display = 'none';
            sendBtn.disabled = true;
            statusLabel.textContent = 'Asbestos is ready';
            inputField.focus();
            currentAbortController = null;
        }

        function stopConversation() {
            if (currentAbortController) {
                currentAbortController.abort();
            }
        }

        function clearConversation() {
            if (isProcessing) stopConversation();
            conversationHistory = [];
            messagesEl.innerHTML = `
                <div class="welcome" id="welcome">
                    <h1>HOW CAN I<br>HELP YOU?</h1>
                    <span class="welcome-subtitle">Private. Personal. Powerful.</span>
                </div>
            `;
            // Re-assign references since we replaced HTML
            const newWelcome = document.getElementById('welcome');
            // Actually just leave it empty if they clear it
            if (newWelcome) newWelcome.style.display = 'flex';
            
            pendingConfirmationId = null;
            clearImage();
            inputField.value = '';
            inputField.style.height = 'auto';
            statusLabel.textContent = 'Asbestos is ready';
        }

        function appendMessage(role, content, imageData = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let innerHTML = '<div class="message-content">';
            if (role === 'assistant') {
                innerHTML += renderMarkdown(content);
            } else {
                if (imageData) {
                    innerHTML += `<img src="${imageData}" class="message-image">`;
                }
                if (content) {
                    innerHTML += `<div>${escapeHtml(content)}</div>`;
                }
            }
            innerHTML += '</div>';
            
            div.innerHTML = innerHTML;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function appendToolIndicator(tool, args, result) {
            const div = document.createElement('div');
            div.className = 'message assistant';
            const statusStr = result?.status === 'ok' ? '✓' : result?.status === 'confirmation_required' ? '⏳' : '✗';
            div.innerHTML = `<div class="tool-indicator">${statusStr} Executing ${tool}...</div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing-indicator';
            div.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {

function copyCode(id) {
  const el = document.getElementById(id);
  if (el) {
    navigator.clipboard.writeText(el.textContent).then(() => {
      const btn = el.closest("pre").querySelector(".copy-btn");
      if (btn) {
        btn.textContent = "Copied!";
        setTimeout(() => {
          btn.textContent = "Copy";
        }, 1500);
      }
    });
  }
}

function renderMarkdown(text) {
  if (!text) return "";
  let html = escapeHtml(text);

  // Code blocks with language labels and copy buttons
  let codeId = 0;
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
    const id = `code-${Date.now()}-${codeId++}`;
    const label = lang || "text";
    return `<pre><div class="code-header"><span>${label}</span><button class="copy-btn" onclick="copyCode('${id}')">Copy</button></div><code id="${id}">${code.trim()}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

  // Tables
  html = html.replace(
    /^\|(.+)\|\s*\n\|[\s:|-]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm,
    (match, headerRow, bodyRows) => {
      const headers = headerRow
        .split("|")
        .map((h) => h.trim())
        .filter(Boolean);
      let table = "<table><thead><tr>";
      headers.forEach((h) => {
        table += `<th>${h}</th>`;
      });
      table += "</tr></thead><tbody>";
      bodyRows
        .trim()
        .split("\n")
        .forEach((row) => {
          const cells = row
            .split("|")
            .map((c) => c.trim())
            .filter(Boolean);
          if (cells.length) {
            table += "<tr>";
            cells.forEach((c) => {
              table += `<td>${c}</td>`;
            });
            table += "</tr>";
          }
        });
      table += "</tbody></table>";
      return table;
    },
  );

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");

  // Headings
  html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");

  // Horizontal rules
  html = html.replace(/^---$/gm, "<hr>");

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li class="ol-item">$1</li>');
  html = html.replace(
    /((?:<li class="ol-item">.*<\/li>\n?)+)/gs,
    "<ol>$1</ol>",
  );

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, "<li>$1</li>");
  html = html.replace(/((?:<li>(?!class).*<\/li>\n?)+)/gs, "<ul>$1</ul>");

  // Line breaks (but not after block elements)
  html = html.replace(/\n/g, "<br>");
  html = html.replace(/(<\/pre>)<br>/g, "$1");
  html = html.replace(/(<\/table>)<br>/g, "$1");
  html = html.replace(/(<\/h[123]>)<br>/g, "$1");
  html = html.replace(/(<\/ul>)<br>/g, "$1");
  html = html.replace(/(<\/ol>)<br>/g, "$1");
  html = html.replace(/(<\/blockquote>)<br>/g, "$1");
  html = html.replace(/<br>(<pre>)/g, "$1");
  html = html.replace(/<br>(<table>)/g, "$1");
  html = html.replace(/<br>(<h[123]>)/g, "$1");
  html = html.replace(/<br>(<ul>)/g, "$1");
  html = html.replace(/<br>(<ol>)/g, "$1");
  html = html.replace(/<br>(<hr>)/g, "$1");
  return html;
}
